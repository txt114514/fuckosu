progress:
  process_steps:
    - osu_imported
    - audio_imported
    - verify_exported
    - difficulty_exported
    - video_matched
    - av_corresponded
    - video_processed
    - video_segmented
  status_steps:
    av_correspondence: av_corresponded
    clip: video_processed
    segment: video_segmented
  required_steps:
    av_correspondence:
      - audio_imported
      - video_matched
    clip:
      - av_corresponded
    segment:
      - video_processed

runtime:
  overwrite: false
  continue_on_error: false

check_data:
  run_get_files: true
  run_verify_export: true
  run_difficulty_export: true

video_clip:
  run_video_match: true
  run_av_correspondence: true
  run_clip_stage: true
  run_segment_stage: true
  use_audio_match_experiment: true
  global_offset_ms: 0.0

file_management:
  export_dir: ../../../osu-lazer/exports
  target_root: ../../../training_package/match-completed_package
  video_root: ../../../training_package/video_package
  segment_root: ../../../training_package/video_segments
  manifest_filename: .package_manifest.sqlite
  audio_filename: audio.mp3
  output_filename: video_processed.mp4

file_formats:
  keyword: normal
  video_suffixes:
    - .mp4
    - .webm
    - .mkv
    - .avi
    - .mov

parameters:
  video_match:
    use_audio_match_experiment: true
  av_correspondence:
    sample_rate: 8000
    envelope_hz: 100
    refine_hz: 1000
    refine_search_seconds: 1.5
    music_lowpass_hz: 1500
  clip:
    crop_reference_width: 2048
    crop_reference_height: 1152
    crop_left: 186
    crop_top: 178
    crop_right: 1768
    crop_bottom: 1080
  segment:
    approach_preempt_ratio: 0.5
    post_context_seconds: 0.4
    min_circle_overlap_ratio: 0.5
    use_priority_merge: true
    priority_merge_window_ms: 200
