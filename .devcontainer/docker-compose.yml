version: "3.9"

services:
  osu-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}

    image: osu-ai-dev:latest
    container_name: osu_ai_dev
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    privileged: true
    network_mode: host
    pid: host
    ipc: host

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - TERM=xterm-256color
      - PULSE_SERVER=unix:/tmp/pulse-native
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    # 挂载：工作区 + X11 + /dev + osu exports
    volumes:
      - ../:/home/dev/workspace:cached
      - /home/pc/.local/share/osu/exports:/data/osu_exports:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:cached
      - /dev:/dev

    working_dir: /home/dev/workspace
    tty: true
    stdin_open: true